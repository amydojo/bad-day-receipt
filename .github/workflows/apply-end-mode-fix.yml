name: apply-end-mode-fix

on:
  push:
    branches:
      - codex/carry-forward-vertical-slice
    paths:
      - '.github/workflows/apply-end-mode-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/carry-forward-vertical-slice
      - name: Apply exact navigation lifecycle patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/carry-forward/CarryForwardApp.tsx')
          content = path.read_text()
          old = """    clearCarryForwardSession(window.localStorage)
              dispatch({ type: 'RESET' })
              if (receiptId) window.location.assign('/')
          """
          new = """    clearCarryForwardSession(window.localStorage)
              if (receiptId) {
                window.location.replace(new URL('/', window.location.href).href)
                return
              }
              dispatch({ type: 'RESET' })
          """
          if content.count(old) != 1:
              raise SystemExit(f'Expected one exact End Mode block, found {content.count(old)}')
          path.write_text(content.replace(old, new))
          PY
          git diff --check
          git diff -- src/carry-forward/CarryForwardApp.tsx
      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name 'amydojo'
          git config user.email 'amycdo98@gmail.com'
          git add src/carry-forward/CarryForwardApp.tsx
          git commit -m 'fix: return to receipt before compile cleanup'
          git push origin HEAD:codex/carry-forward-vertical-slice
