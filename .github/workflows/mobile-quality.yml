name: mobile-quality

on:
  pull_request:
    branches:
      - main
      - agent/mobile-soft-machine
      - agent/mobile-shell
      - agent/mobile-input
      - agent/mobile-printer-stage
      - agent/mobile-artifact-actions
      - agent/mobile-surfaces
      - agent/mobile-pwa
      - agent/mobile-accessibility
      - agent/mobile-performance

jobs:
  validate-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Unit tests
        run: npm test

      - name: Type and production build
        run: npm run build

      - name: Bundle budget
        run: node scripts/analyze-build.mjs

      - name: Cross browser journeys
        run: npm run test:e2e

      - name: Visual evidence
        run: npm run test:visual -- --project=chromium-mobile --project=chromium-desktop

      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 14
