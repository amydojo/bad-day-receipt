name: deployed-parity

on:
  pull_request:
    paths:
      - '.github/workflows/deployed-parity.yml'
      - 'scripts/verify-carry-forward-deployment.mjs'
      - 'scripts/verify-carry-forward-api.mjs'
      - 'scripts/vercel-share-proxy.mjs'
  workflow_dispatch:
    inputs:
      run_live_compiler:
        description: Run the single paid GPT-5.6 synthetic compiler request
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  deployments: read
  issues: read
  pull-requests: read

concurrency:
  group: deployed-parity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  exact-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Resolve exact-SHA Vercel preview
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          mkdir -p deployed-evidence
          for attempt in $(seq 1 60); do
            while read -r deployment_id; do
              [ -n "$deployment_id" ] || continue
              url=$(gh api "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses?per_page=100" \
                --jq '[.[] | select(.state == "success") | (.environment_url // .target_url // empty) | select(contains("vercel.app"))][0] // empty')
              if [ -n "$url" ]; then
                echo "DEPLOYED_BASE=${url%/}" >> "$GITHUB_ENV"
                host=${url#https://}
                host=${host%%/*}
                {
                  echo "head_sha=${HEAD_SHA}"
                  echo "deployment_url=${url%/}"
                  echo "deployment_host=${host}"
                  getent ahostsv4 "$host" | sort -u
                } | tee deployed-evidence/resolution.txt
                exit 0
              fi
            done < <(gh api "repos/${GITHUB_REPOSITORY}/deployments?sha=${HEAD_SHA}&per_page=100" --jq '.[].id')
            sleep 10
          done
          echo "No successful Vercel deployment found for ${HEAD_SHA}." >&2
          exit 1
      - name: Resolve protected-preview access
        id: access
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_LIVE: ${{ inputs.run_live_compiler }}
        run: |
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            echo "ACCESS_MODE=bypass" >> "$GITHUB_ENV"
            if [ "$DISPATCH_LIVE" = "true" ]; then echo "RUN_LIVE=1" >> "$GITHUB_ENV"; fi
            exit 0
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo 'No pull request is available for temporary protected-preview access.' >&2
            exit 1
          fi

          for attempt in $(seq 1 90); do
            body=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" --paginate \
              --jq '[.[] | select(.body | contains("<!-- carry-forward-preview-share -->"))][-1].body // empty')
            share=$(printf '%s\n' "$body" | grep -Eo 'https://[^[:space:]]+\.vercel\.app/\?_vercel_share=[A-Za-z0-9]+' | head -n 1 || true)
            if [ -n "$share" ]; then
              echo "::add-mask::$share"
              echo "VERCEL_SHARE_URL=$share" >> "$GITHUB_ENV"
              echo "ACCESS_MODE=share" >> "$GITHUB_ENV"
              if printf '%s' "$body" | grep -q '<!-- carry-forward-run-live -->'; then
                echo "RUN_LIVE=1" >> "$GITHUB_ENV"
              fi
              echo 'Temporary protected-preview access acquired and masked.'
              exit 0
            fi
            sleep 10
          done
          echo 'No temporary protected-preview access path was supplied.' >&2
          exit 1
      - run: npx playwright install --with-deps chromium
      - name: Start ephemeral Vercel share proxy
        if: env.ACCESS_MODE == 'share'
        shell: bash
        run: |
          node scripts/vercel-share-proxy.mjs > deployed-evidence/share-proxy.log 2>&1 &
          echo $! > deployed-evidence/share-proxy.pid
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:4174/__health >/dev/null; then
              echo 'DEPLOYED_BASE=http://127.0.0.1:4174' >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 1
          done
          cat deployed-evidence/share-proxy.log >&2
          exit 1
      - name: Verify deployed M01–M13 journeys
        run: node scripts/verify-carry-forward-deployment.mjs
      - name: Verify sanitized invalid request
        run: node scripts/verify-carry-forward-api.mjs
      - name: Run one authorized synthetic GPT-5.6 request
        if: env.RUN_LIVE == '1'
        env:
          RUN_OPENAI_LIVE: '1'
        run: node scripts/verify-carry-forward-api.mjs
      - name: Upload deployed evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carry-forward-deployed-evidence
          path: deployed-evidence
          if-no-files-found: warn
          retention-days: 7
