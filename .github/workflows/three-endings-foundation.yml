name: three-endings-foundation

on:
  pull_request:
    paths:
      - '.github/workflows/three-endings-foundation.yml'
      - '.github/workflows/production-three-endings-smoke.yml'
      - 'docs/receipt-ending-state-machine.md'
      - 'docs/three-endings-hardening-*.md'
      - 'docs/three-valid-endings.md'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.production.config.ts'
      - 'scripts/assert-production-three-endings.mjs'
      - 'scripts/assert-production-three-endings.test.mjs'
      - 'src/App.tsx'
      - 'src/motion/**'
      - 'src/mobile-instrument/sensory/**'
      - 'src/carry-forward/CarryForwardPrimitives.tsx'
      - 'src/carry-forward/designation/**'
      - 'src/carry-forward/integration/**'
      - 'src/carry-forward/ritual/**'
      - 'src/components/Receipt.tsx'
      - 'src/components/ReceiptMachine.tsx'
      - 'src/main.tsx'
      - 'src/receipt-ending/**'
      - 'src/soft-machine/persistence.ts'
      - 'src/soft-machine/persistence.test.ts'
      - 'tests/fixtures/threeEndingsFaults.ts'
      - 'tests/e2e/carry-designation.spec.ts'
      - 'tests/e2e/carry-forward-in-tree.spec.ts'
      - 'tests/e2e/carry-forward-ritual.spec.ts'
      - 'tests/e2e/keep-receipt.spec.ts'
      - 'tests/e2e/production-three-endings-smoke.spec.ts'
      - 'tests/e2e/release-receipt.spec.ts'
      - 'tests/e2e/three-endings-foundation.spec.ts'
      - 'tests/e2e/three-endings-hardening.spec.ts'
      - 'tests/e2e/three-endings-history.spec.ts'
      - 'tests/visual/carry-designation.spec.ts'
      - 'tests/visual/carry-forward-in-tree.spec.ts'
      - 'tests/visual/carry-forward-ritual.spec.ts'
      - 'tests/visual/three-endings-hardening.spec.ts'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: three-endings-foundation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  foundation-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run full unit suite
        run: npm test
      - name: Prove the production build succeeds with Three Endings enabled
        run: VERCEL_ENV=production VITE_THREE_ENDINGS=true npm run build
      - name: Prove the production build fails closed without Three Endings
        shell: bash
        run: |
          mkdir -p test-results
          set +e
          VERCEL_ENV=production VITE_THREE_ENDINGS=false npm run build > test-results/production-guard-negative.log 2>&1
          status=$?
          set -e
          cat test-results/production-guard-negative.log
          if [ "$status" -eq 0 ]; then
            echo "Expected the production release guard to fail."
            exit 1
          fi
          grep -F "Production build blocked" test-results/production-guard-negative.log
          grep -F "legacy completed-receipt Evidence Viewer" test-results/production-guard-negative.log
      - run: npx playwright install --with-deps chromium
      - name: Run exact Three Endings release command
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/three-endings-results.json
        run: npm run release:three-endings
      - name: Run Three Endings visual fixtures
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/three-endings-visual-results.json
        run: VITE_THREE_ENDINGS=true npx playwright test tests/visual/carry-designation.spec.ts tests/visual/carry-forward-ritual.spec.ts tests/visual/carry-forward-in-tree.spec.ts tests/visual/three-endings-hardening.spec.ts --project=chromium-desktop --reporter=json
      - name: Upload focused browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: three-endings-foundation-browser-evidence
          path: test-results
          if-no-files-found: warn
          retention-days: 7
