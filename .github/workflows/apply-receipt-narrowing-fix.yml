name: apply-receipt-narrowing-fix

on:
  push:
    branches:
      - codex/carry-forward-vertical-slice
    paths:
      - '.github/workflows/apply-receipt-narrowing-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/carry-forward-vertical-slice
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply exact narrowed authority patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/carry-forward/CarryForwardApp.tsx')
          content = path.read_text()
          old = """    const receiptId = state.budget.receiptId
          """
          new = """    const receiptId = state.kind === 'budget'
                ? state.draft.receiptId
                : state.budget.receiptId
          """
          count = content.count(old)
          if count != 1:
              raise SystemExit(f'Expected one exact receipt authority line, found {count}')
          path.write_text(content.replace(old, new))
          PY
          git diff --check
          git diff -- src/carry-forward/CarryForwardApp.tsx
      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name 'amydojo'
          git config user.email 'amycdo98@gmail.com'
          git add src/carry-forward/CarryForwardApp.tsx
          git commit -m 'fix: narrow receipt authority before budget declaration'
          git push origin HEAD:codex/carry-forward-vertical-slice
      - run: npm ci
      - run: npm run build
