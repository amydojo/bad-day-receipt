name: carry-forward

on:
  pull_request:
    paths:
      - '.github/workflows/carry-forward.yml'
      - 'api/**'
      - 'docs/carry-forward.md'
      - 'docs/privacy.md'
      - 'docs/threat-model.md'
      - 'evals/carry-forward/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'README.md'
      - 'src/carry-forward/**'
      - 'tests/api/**'
      - 'tests/e2e/carry-forward*.spec.ts'
      - 'tsconfig.api.json'
      - 'tsconfig.app.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: carry-forward-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify Vercel-compatible TypeScript compiler
        run: node -e "const ts=require('typescript'); if(ts.version!=='5.9.3'||!ts.sys?.readFile) process.exit(1); console.log(ts.version, true)"
      - run: npx playwright install --with-deps chromium
      - name: Run release gate with failure diagnostics
        id: release
        continue-on-error: true
        run: npm run release:carry-forward > release.log 2>&1
      - name: Upload release diagnostics
        if: steps.release.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: carry-forward-release-diagnostics
          path: |
            release.log
            test-results
            playwright-report
          if-no-files-found: warn
          retention-days: 1
      - name: Fail when release gate failed
        if: steps.release.outcome == 'failure'
        run: exit 1
