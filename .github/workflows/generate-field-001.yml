name: generate-field-001

on:
  push:
    branches:
      - production/field-001
    paths:
      - .github/workflows/generate-field-001.yml
      - artifacts/field-batch-001/manifest.json
      - scripts/generate-field-qr-batch.py
      - scripts/verify-field-qr-batch.py
      - scripts/requirements-field-qr.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production/field-001
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-field-qr.txt
      - name: Install deterministic QR tooling
        run: python -m pip install -r scripts/requirements-field-qr.txt
      - name: Generate FIELD-001 vectors from the permanent manifest
        run: python scripts/generate-field-qr-batch.py
      - name: Decode and verify every generated destination
        run: python scripts/verify-field-qr-batch.py
      - name: Commit generated production assets
        run: |
          git config user.name "labdojo-field-bot"
          git config user.email "actions@users.noreply.github.com"
          git add artifacts/field-batch-001/LD-*.svg
          if git diff --cached --quiet; then
            echo "FIELD-001 assets already match the manifest."
            exit 0
          fi
          git commit -m "Generate verified FIELD-001 QR assets"
          git push origin HEAD:production/field-001
